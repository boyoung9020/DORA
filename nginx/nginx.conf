upstream api {
    server api:4000;
}

# HTTP -> HTTPS 리다이렉트
server {
    listen 80;
    server_name syncwork.kr www.syncwork.kr;
    return 301 https://$host$request_uri;
}

# HTTPS 서버
server {
    listen 443 ssl;
    server_name syncwork.kr www.syncwork.kr;

    ssl_certificate /etc/letsencrypt/live/syncwork.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/syncwork.kr/privkey.pem;

    client_max_body_size 50M;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # WebSocket 프록시
    location /api/ws {
        proxy_pass http://api/api/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # API 프록시
    # 업로드 파일 프록시 - 정적 파일 regex location보다 우선 처리
    location ^~ /api/uploads/ {
        proxy_pass http://api/api/uploads/;
        proxy_redirect off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # API 프록시
    location /api {
        proxy_pass http://api/api;
        proxy_redirect off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 헬스 체크
    location /health {
        proxy_pass http://api/health;
        proxy_set_header Host $host;
    }

    # Flutter 웹 정적 파일
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        index index.html;
    }

    # Flutter 앱 셸과 런타임 파일은 항상 재검사해서 새 배포를 놓치지 않게 한다.
    location ~* ^/(index\.html|flutter\.js|flutter_bootstrap\.js|flutter_service_worker\.js|main\.dart\.js|manifest\.json|version\.json)$ {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location ~* ^/(canvaskit/.*\.(js|wasm)|assets/.*\.json)$ {
        root /usr/share/nginx/html;
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # 비교적 덜 민감한 정적 자산만 짧게 캐시한다.
    location ~* \.(jpg|jpeg|png|gif|ico|css|woff|woff2|ttf|eot|svg|mp4|frag|bin|txt)$ {
        root /usr/share/nginx/html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }
}
