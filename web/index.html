<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Sync">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Sync</title>
  <link rel="manifest" href="manifest.json">

  <!-- 폰트 preload: 브라우저가 Flutter bootstrap 실행 전에 폰트 다운로드 시작 -->
  <link rel="preload" as="font"
        href="assets/font/nanum-square-round/NanumSquareRoundL.ttf"
        type="font/truetype" crossorigin="anonymous">
  <link rel="preload" as="font"
        href="assets/font/nanum-square-round/NanumSquareRoundR.ttf"
        type="font/truetype" crossorigin="anonymous">
  <link rel="preload" as="font"
        href="assets/font/nanum-square-round/NanumSquareRoundB.ttf"
        type="font/truetype" crossorigin="anonymous">
  <link rel="preload" as="font"
        href="assets/font/nanum-square-round/NanumSquareRoundEB.ttf"
        type="font/truetype" crossorigin="anonymous">

  <style>
    body { margin: 0; background-color: #FFF8F2; }

    /* CSS @font-face: Flutter 렌더링 이전에도 브라우저가 한글 폰트 사용 가능 */
    /* font-display: block → 폰트 로드 완료 전 텍스트 숨김 (깨진 글자 대신 빈 공간) */
    @font-face {
      font-family: 'NanumSquareRound';
      src: url('assets/font/nanum-square-round/NanumSquareRoundL.ttf') format('truetype');
      font-weight: 300;
      font-display: block;
    }
    @font-face {
      font-family: 'NanumSquareRound';
      src: url('assets/font/nanum-square-round/NanumSquareRoundR.ttf') format('truetype');
      font-weight: 400;
      font-display: block;
    }
    @font-face {
      font-family: 'NanumSquareRound';
      src: url('assets/font/nanum-square-round/NanumSquareRoundB.ttf') format('truetype');
      font-weight: 700;
      font-display: block;
    }
    @font-face {
      font-family: 'NanumSquareRound';
      src: url('assets/font/nanum-square-round/NanumSquareRoundEB.ttf') format('truetype');
      font-weight: 800;
      font-display: block;
    }
    #flutter-loading {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: #FFF8F2;
      z-index: 2147483647;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #flutter-loading-track {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 3px;
      background: #FFDFC0;
      overflow: hidden;
    }
    #flutter-loading-bar {
      height: 100%;
      background: linear-gradient(to right, #E3833D, #D86B27);
      animation: flutter-slide 1.4s ease-in-out infinite;
      width: 40%;
    }
    @keyframes flutter-slide {
      0%   { transform: translateX(-150%); }
      100% { transform: translateX(350%); }
    }
  </style>
</head>
<body>
  <div id="flutter-loading">
    <div id="flutter-loading-track">
      <div id="flutter-loading-bar"></div>
    </div>
  </div>
  <script>
    // Flutter 앱 영역에서 브라우저 기본 컨텍스트 메뉴 비활성화
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });
    // Flutter 첫 프레임 렌더링 후 폰트 로드 완료 시점에 오버레이 제거
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('flutter-loading');
      if (!el) return;
      document.fonts.ready.then(function() {
        el.style.transition = 'opacity 0.3s ease';
        el.style.opacity = '0';
        setTimeout(function() { el.remove(); }, 300);
      });
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
