services:
  postgres:
    image: postgres:15-alpine
    container_name: sync_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: sync_db
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sync_network
    restart: always

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sync_api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_NAME: sync_db
      SECRET_KEY: TH-Xej6q7F3K3tJGtR7R20T2miI1h_P0myhfjke-rak
      PYTHONPATH: /app
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        export PYTHONPATH=/app:$PYTHONPATH &&
        python app/init_db.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    networks:
      - sync_network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: sync_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./build/web:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - sync_network
    restart: always

networks:
  sync_network:
    driver: bridge
