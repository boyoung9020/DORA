services:
  postgres:
    image: postgres:15-alpine
    container_name: sync_postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sync_network
    restart: always

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sync_api
    env_file: .env
    environment:
      PYTHONPATH: /app
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        python app/init_db.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 4000 --workers 2
      "
    networks:
      - sync_network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: sync_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./build/web:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - sync_network
    restart: always

networks:
  sync_network:
    driver: bridge
