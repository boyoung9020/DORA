name: Release Windows Desktop

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: >
          flutter build windows --release
          --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}
          --dart-define=GOOGLE_DESKTOP_CLIENT_ID=${{ secrets.GOOGLE_DESKTOP_CLIENT_ID }}
          --dart-define=GOOGLE_DESKTOP_CLIENT_SECRET=${{ secrets.GOOGLE_DESKTOP_CLIENT_SECRET }}
          --dart-define=KAKAO_NATIVE_APP_KEY=${{ secrets.KAKAO_NATIVE_APP_KEY }}
          --dart-define=KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          iscc /DMyAppVersion="$version" installer\setup.iss

      - name: Prepare release assets
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          $installerName = "SYNC_Setup_${version}.exe"
          $installerPath = "installer\Output\$installerName"
          echo "INSTALLER_NAME=$installerName" >> $env:GITHUB_ENV
          echo "INSTALLER_PATH=$installerPath" >> $env:GITHUB_ENV

      - name: Extract release notes from CHANGELOG
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $content = Get-Content CHANGELOG.md -Raw -Encoding UTF8
          if ($content -match "(?s)(## \[$tag\].+?)(?=\r?\n## \[|$)") {
            $notes = $Matches[1].Trim()
          } else {
            $notes = "Release $tag"
          }
          $notes | Out-File -FilePath release_notes.md -Encoding utf8

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: ${{ env.INSTALLER_PATH }}
          draft: false
          prerelease: false
